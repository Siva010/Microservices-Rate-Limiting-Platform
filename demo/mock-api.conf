server {
    listen 80;

    location /get {
        default_type application/json;
        return 200 '{"args":{},"headers":{},"origin":"mock-api","url":"http://demo/get","message":"Demo downstream is working"}';
    }

    location / {
        default_type application/json;
        return 200 '{"status":"ok","service":"mock-downstream","path":"$uri"}';
    }
}